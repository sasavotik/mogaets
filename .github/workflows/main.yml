name: MacRDP Multi-Method
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Setup Environment
      run: |
        cd /tmp
        # Создание пользователя
        sudo dscl . -create /Users/runneradmin
        sudo dscl . -create /Users/runneradmin UserShell /bin/bash
        sudo dscl . -create /Users/runneradmin RealName Runner_Admin
        sudo dscl . -create /Users/runneradmin UniqueID 1001
        sudo dscl . -create /Users/runneradmin PrimaryGroupID 80
        sudo dscl . -create /Users/runneradmin NFSHomeDirectory /Users/runneradmin
        sudo dscl . -passwd /Users/runneradmin P@ssw0rd!
        sudo createhomedir -c -u runneradmin > /dev/null
        sudo dscl . -append /Groups/admin GroupMembership runneradmin

    - name: Tailscale Setup
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

    - name: Enable VNC with Multi-Method Fallback
      run: |
        cd /tmp
        
        # --- Метод 1: Стандартная активация ---
        echo "::group::Attempt 1: Standard Kickstart"
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -allowAccessFor -allUsers -privs -all || echo "Method 1 failed"
        echo "::endgroup::"

        # --- Метод 2: Настройка пароля и VNC Legacy (Критично для работы) ---
        echo "::group::Attempt 2: Configure Password & Legacy"
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes
        # Установка пароля через perl-скрипт (самый надежный способ)
        echo runnerrdp | perl -we 'BEGIN { @k = unpack "C*", pack "H*", "1734516E8BA8C5E2FF1C39567390ADCA"}; $_ = <>; chomp; s/^(.{8}).*/$1/; @p = unpack "C*", $_; foreach (@k) { printf "%02X", $_ ^ (shift @p || 0) }; print "\n"' | sudo tee /Library/Preferences/com.apple.VNCSettings.txt
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent -console
        echo "::endgroup::"

        # --- Метод 3: Форсированный запуск (если Агент не отзывается) ---
        echo "::group::Attempt 3: Force Activate & Wakeup"
        # Проверяем, запущен ли процесс
        if ! pgrep -x "ARDAgent" > /dev/null; then
           echo "ARDAgent is NOT running. Forcing..."
           sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -privs -all -restart -agent -console
        fi
        # Caffeinate заставляет систему думать, что пользователь активен (обход "черного экрана")
        sudo caffeinate -d & 
        echo "::endgroup::"

    - name: Setup Web Proxy (noVNC)
      run: |
        cd /tmp
        brew install websockify
        git clone https://github.com/novnc/noVNC.git
        # Запуск прокси
        ./noVNC/utils/websockify/run 6080 localhost:5900 > /dev/null 2>&1 &

    - name: Connection Details
      run: |
        echo "=================================================="
        echo "Tailscale IP: $(tailscale ip -4)"
        echo "Link (Open in browser): http://$(tailscale ip -4):6080/vnc.html"
        echo "VNC Password: runnerrdp"
        echo "User: runneradmin"
        echo "=================================================="
          
    - name: Stay Alive
      uses: mxschmitt/action-tmate@v2
