name: MacRDP Ultimate
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Setup User
      run: |
        sudo dscl . -create /Users/runneradmin
        sudo dscl . -create /Users/runneradmin UserShell /bin/bash
        sudo dscl . -create /Users/runneradmin RealName Runner_Admin
        sudo dscl . -create /Users/runneradmin UniqueID 1001
        sudo dscl . -create /Users/runneradmin PrimaryGroupID 80
        sudo dscl . -create /Users/runneradmin NFSHomeDirectory /Users/runneradmin
        sudo dscl . -passwd /Users/runneradmin P@ssw0rd!
        sudo createhomedir -c -u runneradmin > /dev/null
        sudo dscl . -append /Groups/admin GroupMembership runneradmin

    - name: Install Tailscale
      env:
        TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      run: |
        brew install tailscale
        sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 &
        sleep 5
        sudo tailscale up --authkey=$TS_AUTHKEY
        echo "Tailscale IP: $(tailscale ip -4)"

    - name: Enable VNC
      run: |
        # Активация ARD (VNC)
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -allowAccessFor -allUsers -privs -all -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw runnerrdp -restart -agent -console
        
        # Защита от сна (критично для отсутствия черного экрана)
        sudo caffeinate -d &

    - name: Setup Web Proxy (noVNC)
      run: |
        # Устанавливаем через pip3 вместо brew
        pip3 install websockify
        git clone https://github.com/novnc/noVNC.git /tmp/noVNC
        # Запускаем через python3 напрямую
        python3 -m websockify 6080 localhost:5900 &
        echo "Proxy started on port 6080"

    - name: Connection Details
      run: |
        echo "=================================================="
        echo "ИНСТРУКЦИЯ ДЛЯ БРАУЗЕРА:"
        echo "1. Убедитесь, что Tailscale запущен на вашем локальном ПК."
        echo "2. Откройте: http://$(tailscale ip -4):6080/vnc.html"
        echo "3. В поле 'Password' введите: runnerrdp"
        echo "=================================================="

    - name: Stay Alive
      uses: mxschmitt/action-tmate@v2
