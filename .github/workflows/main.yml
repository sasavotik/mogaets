name: Xcode Remote Lab
on: workflow_dispatch

jobs:
  xcode-session:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo /opt/homebrew/opt/tailscale/bin/tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect to Tailscale Network
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=xcode-mac --accept-routes

      - name: Force Set Password and Enable VNC
        run: |
          # В GitHub Actions sudo passwd работает без подтверждения старого пароля
          echo "password123" | sudo passwd runner
          echo "password123" | sudo passwd runner # Повтор для уверенности

          # Включаем удаленный рабочий стол (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on -restart -agent -privs -all \
          -allowAccessFor -specifiedUsers
          
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -configure -users runner -access -on -privs -all

      - name: Get IP and Wait
        run: |
          echo "IP для подключения в VNC: $(tailscale ip -4)"
          echo "Логин: runner"
          echo "Пароль: password123"
          xcodebuild -version
          sleep 21600
