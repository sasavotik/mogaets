name: Xcode Remote Lab (Ultimate Setup)
on: workflow_dispatch

jobs:
  xcode-session:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo /opt/homebrew/opt/tailscale/bin/tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect to Tailscale Network
        run: |
          # Используй свой секрет TAILSCALE_AUTH_KEY
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=xcode-mac --accept-routes

      - name: Setup SSH Access (Passwordless)
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "ssh-rsa  user@WIN-N3H3EVF474E" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

      - name: Create Admin User and Configure VNC
        run: |
          # 1. Создаем пользователя 'apple' с паролем 'password123'
          sudo sysadminctl -addUser apple -fullName "Apple" -password "password123" -admin || true
          
          # 2. Устанавливаем VNC пароль 'password123' для совместимости (TightVNC)
          sudo perl -we 'print "\x3a\xa4\xca\x05\x0f\x39\x3e\x4a"' > /tmp/vncpw
          sudo cp /tmp/vncpw /Library/Preferences/com.apple.VNCPassword
          sudo chmod 600 /Library/Preferences/com.apple.VNCPassword

          # 3. Включаем Screen Sharing и разрешаем доступ всем
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on -restart -agent -privs -all -allowAccessFor -allUsers
          
          # 4. Включаем поддержку старых VNC-клиентов
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartPassworded -bool true

      - name: Fix Black Screen (Virtual Display)
        run: |
          # Настраиваем разрешение, чтобы графическая оболочка "проснулась"
          sudo defaults write /Library/Preferences/com.apple.windowserver.plist DisplayResolutionEnabled -bool true
          sudo launchctl kickstart -kp system/com.apple.screensharing

      - name: Final Info
        run: |
          echo "===================================================="
          echo "IP: $(tailscale ip -4)"
          echo "1. SSH (без пароля): ssh runner@$(tailscale ip -4)"
          echo "2. VNC Пароль: password123"
          echo "3. Внутри Мака логин: apple / пароль: password123"
          echo "===================================================="
          sleep 21600
