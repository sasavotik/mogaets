name: Windows RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    steps:
      # 1. Клонируем репозиторий
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Настраиваем и включаем службу Windows Remote Desktop (RDP)
      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      # 3. Подключаемся к вашей сети через официальный экшен Tailscale
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      # 4. Выводим IP-адрес раннера в сети Tailscale и держим его активным
      - name: Hold the Runner
        shell: powershell
        run: |
          # Автоматически находим путь к установленному экшеном tailscale.exe
          $env:Path += ";C:\Program Files\Tailscale"
          $tsIp = tailscale ip -4
          
          Write-Host "=========================================================="
          Write-Host "Tailscale IP is: $tsIp"
          Write-Host "Runner is ready. RDP into the machine using this IP."
          Write-Host "=========================================================="
          
          # Удерживает раннер активным до 6 часов (21600 секунд)
          Start-Sleep -Seconds 21600
