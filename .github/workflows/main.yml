name: Windows RDP via Tailscale

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    steps:
      # 1. Check out repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Enable Windows RDP
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      # 3. Connect to Tailscale
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # 4. Keep Runner Active
      - name: Hold the Runner
        run: |
          Write-Host "Tailscale IP is (Get-TailscaleAddress)"
          Write-Host "Runner is ready. RDP into the machine using the Tailscale IP."
          Start-Sleep -Seconds 21600
