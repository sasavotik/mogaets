name: Xcode Remote Lab (Hardcoded SSH)
on: workflow_dispatch

jobs:
  xcode-session:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo /opt/homebrew/opt/tailscale/bin/tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect to Tailscale Network
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=xcode-mac --accept-routes

      - name: Setup SSH Key Only
        run: |
          mkdir -p ~/.ssh
          echo "ssh-rsa  user@WIN-N3H3EVF474E" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          
          # Включаем VNC (без смены пароля, чтобы не упало)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all

      - name: Final Info
        run: |
          echo "===================================================="
          echo "IP: $(tailscale ip -4)"
          echo "Команда для входа: ssh runner@$(tailscale ip -4)"
          echo "===================================================="
          sleep 21600
