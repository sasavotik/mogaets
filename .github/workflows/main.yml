name: Xcode Remote Lab (Strict SSH)
on: workflow_dispatch

jobs:
  xcode-session:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo /opt/homebrew/opt/tailscale/bin/tailscaled --tun=userspace-networking &
          sleep 5

      - name: Connect to Tailscale Network
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=xcode-mac --accept-routes

      - name: Force Enable SSH Keys
        run: |
          # Создаем директорию и файл ключей
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Записываем ключ максимально аккуратно
          printf "ssh-rsa  user@WIN-N3H3EVF474E" > ~/.ssh/authorized_keys
          
          chmod 600 ~/.ssh/authorized_keys
          
          # Пингуем SSH конфиг, чтобы он точно разрешал ключи
          sudo sed -i '' 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist

      - name: Final Info
        run: |
          echo "IP: $(tailscale ip -4)"
          echo "Пробуй: ssh -o PasswordAuthentication=no runner@$(tailscale ip -4)"
          sleep 21600
